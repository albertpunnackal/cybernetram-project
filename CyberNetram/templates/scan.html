{% extends "base.html" %}
{% block content %}

<style>
    .scanner-card {
        background-color: var(--bg-card, #1a1a2e);
        padding: 40px;
        border-radius: 12px;
        border: 1px solid #00ff88;
        box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
        width: 100%;
        max-width: 600px;
        text-align: center;
        margin: 0 auto;
    }
    .upload-area {
        border: 2px dashed #00f3ff;
        border-radius: 10px;
        padding: 40px 20px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 20px;
        background: rgba(0, 243, 255, 0.05);
    }
    .upload-area:hover {
        background: rgba(0, 243, 255, 0.1);
        box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
    }
    .upload-icon {
        font-size: 3rem;
        color: #00f3ff;
        margin-bottom: 15px;
    }
    input[type="file"] {
        display: none;
    }
    /* Loading Animation */
    .loader {
        display: none;
        border: 4px solid rgba(255,255,255,0.1);
        border-top: 4px solid #00f3ff;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* Results Section */
    .result-box {
        display: none;
        margin-top: 20px;
        padding: 20px;
        border-radius: 8px;
        text-align: left;
        background: rgba(0,0,0,0.5);
        border: 1px solid #333;
        word-wrap: break-word;
    }
    .hash-display {
        font-family: 'JetBrains Mono', monospace;
        color: #aaa;
        font-size: 0.85rem;
        margin-top: 5px;
        background: #000;
        padding: 10px;
        border-radius: 5px;
    }
    .status-safe { color: #00ff88; font-weight: bold; font-size: 1.2rem; }
    .status-danger { color: #ff0055; font-weight: bold; font-size: 1.2rem; }
</style>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="scanner-card">
            <h2 style="color: #00ff88; margin-top: 0;"><i class="fas fa-shield-virus"></i> Local Threat Scanner</h2>
            <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 30px;">
                100% Air-Gapped. Files never leave your browser.
            </p>

            <!-- Drag & Drop / Click Area -->
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-file-shield upload-icon"></i>
                <h3 style="margin: 0; color: #fff;">Click to select a file</h3>
                <p style="color: #888; font-size: 0.8rem; margin-top: 10px;">Any file type supported (Max 50MB)</p>
            </div>
            <input type="file" id="fileInput" onchange="processFile(event)">

            <!-- Scanning Animation -->
            <div class="loader" id="loader"></div>

            <!-- Results Display -->
            <div class="result-box" id="resultBox">
                <div id="statusText"></div>
                <div style="margin-top: 15px; font-size: 0.8rem; color: #888;">GENERATED SHA-256 HASH (LOCAL):</div>
                <div class="hash-display" id="hashText"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 1. LOCAL THREAT DATABASE ---
    // Instead of using a Python dictionary, we store the hashes directly in the browser memory.
    const localThreatDB = {
        // EICAR standard anti-virus test file
        "275a021bbfb6489e54d471899f7db9d1663fc695ec2fe2a2c4538aabf651fd0f": "EICAR Test Virus",
        
        // Hash of a text file containing exactly the word "malware" (for your live demo)
        "4708ba1c38cc017cd77de5647c0a6493b2a26c4839de8d98d8ee341b52a51704": "Demo Text Malware Signature",

        // Add the custom hashes generated by your generate_test_files.py script below:
        "3d49e6f364377a0df4721ab7dfb22106e2e2ec1ffbd62c8fb6a5ba1d84f88e5e": "WannaCry Ransomware (Demo)",
        "db314dbbfcc0495f2e6ee5474ab7183e81cb8d31cc001047192667b3ab565757": "Zeus Banking Trojan (Demo)"
    };

    async function processFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        // Reset UI
        document.getElementById('resultBox').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        if (file.size > 50 * 1024 * 1024) {
            alert("For this local demo, please select a file under 50MB.");
            document.getElementById('loader').style.display = 'none';
            return;
        }

        try {
            // Read the file as raw binary data
            const arrayBuffer = await file.arrayBuffer();
            
            // --- 2. GENERATE SHA-256 DYNAMICALLY ---
            // Built-in Web Crypto API (Works completely offline without Python)
            const hashBuffer = await crypto.subtle.digest('SHA-256', arrayBuffer);
            
            // Convert to hex string
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            // Simulate scanning delay for visual effect
            setTimeout(() => {
                displayResults(hashHex, file.name);
            }, 1200);

        } catch (error) {
            console.error("Error hashing file:", error);
            alert("Error processing file locally.");
            document.getElementById('loader').style.display = 'none';
        }
    }

    function displayResults(hash, filename) {
        document.getElementById('loader').style.display = 'none';
        const resultBox = document.getElementById('resultBox');
        const statusText = document.getElementById('statusText');
        const hashText = document.getElementById('hashText');

        resultBox.style.display = 'block';
        hashText.innerText = hash;

        // --- 3. CHECK AGAINST LOCAL DB ---
        if (localThreatDB[hash]) {
            const threatName = localThreatDB[hash];
            statusText.innerHTML = `<span class="status-danger"><i class="fas fa-triangle-exclamation"></i> THREAT DETECTED</span><br><span style="color:#ddd; font-size:0.9rem;">File '${filename}' matches a known malware signature:<br><strong style="color: #ff0055;">${threatName}</strong></span>`;
            resultBox.style.borderColor = "#ff0055";
            resultBox.style.boxShadow = "0 0 20px rgba(255,0,85,0.3)";
        } else {
            statusText.innerHTML = `<span class="status-safe"><i class="fas fa-check-circle"></i> FILE IS SAFE</span><br><span style="color:#ddd; font-size:0.9rem;">File '${filename}' does not match any known threats.</span>`;
            resultBox.style.borderColor = "#00ff88";
            resultBox.style.boxShadow = "0 0 20px rgba(0,255,136,0.2)";
        }
    }
</script>

{% endblock %}
